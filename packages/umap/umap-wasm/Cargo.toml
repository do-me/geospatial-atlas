[package]
name = "umap-wasm"
version = "0.1.0"
edition = "2021"
description = "WASM bindings for UMAP and NNDescent"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
nndescent = { path = "../nndescent" }
umap = { path = "../umap" }
wasm-bindgen = "0.2.114"
js-sys = "0.3"
ndarray = "0.17"
getrandom = { version = "0.4", features = ["wasm_js"] }
