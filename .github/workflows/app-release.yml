name: app release (desktop)

# Builds the native desktop app (Tauri 2 shell + PyInstaller sidecar) for
# macOS (arm64 only — see below), Linux (x86_64 .deb + .rpm), and
# Windows (x86_64 .msi + .exe NSIS installer).
#
# macOS x86_64 was dropped starting with v0.0.2: macos-13 runners
# routinely sit in the queue for >10 h before picking up a job, which
# stalls every release. Intel-Mac users should fall back to the
# ``uv run geospatial-atlas`` CLI path until GitHub restores sensible
# macos-13 capacity.
#
# Trigger manually via the Actions tab or by pushing a tag shaped like
# `app-v0.0.1`. On tag push, the built artifacts are attached to a draft
# GitHub Release.

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Attach built artifacts to a draft release"
        required: false
        default: "false"
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            arch: arm64
            target: aarch64-apple-darwin
            runner: macos-14
          - os: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - os: windows
            arch: x64
            target: x86_64-pc-windows-msvc
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Rust toolchain (+ wasm32 for density-clustering)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}, wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        uses: baptiste0928/cargo-install@v3
        with:
          crate: wasm-bindgen-cli
          version: "0.2.114"

      - name: Cache Cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target
            packages/density-clustering -> target
          shared-key: ${{ matrix.target }}

      # Linux: WebKitGTK + GTK for the Tauri webview, appindicator for tray,
      # rpm/rpmbuild so 'tauri build' can emit the .rpm target (included in
      # tauri.conf.json's "targets": "all").
      - name: Install Linux system deps
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install npm workspaces (root → component, viewer, backend, …)
        run: npm install --no-audit --no-fund

      # Workaround for https://github.com/npm/cli/issues/4828: npm's
      # workspace install doesn't reliably install platform-specific
      # optional deps (rolldown/lightningcss native bindings). Force-
      # install the matching ones so viewer/component builds can
      # require them at runtime.
      - name: Install platform-specific native bindings
        shell: bash
        run: |
          case "${{ matrix.os }}-${{ matrix.arch }}" in
            macos-arm64)
              PKGS="@rolldown/binding-darwin-arm64 lightningcss-darwin-arm64" ;;
            linux-x64)
              PKGS="@rolldown/binding-linux-x64-gnu lightningcss-linux-x64-gnu" ;;
            windows-x64)
              PKGS="@rolldown/binding-win32-x64-msvc lightningcss-win32-x64-msvc" ;;
          esac
          if [ -n "$PKGS" ]; then
            npm install --no-save --no-audit --no-fund $PKGS
          fi

      - name: Sync backend Python env
        working-directory: packages/backend
        run: uv sync --frozen

      # Unified across platforms — runs in git-bash on Windows. The
      # npm_config_script_shell override is needed because nested
      # package.json scripts (density-clustering, umap-wasm) use
      # 'rm -rf' which is not available in Windows cmd.exe; forcing
      # bash as npm's script shell keeps one codepath for all four
      # runners.
      - name: Build viewer + backend static bundle
        working-directory: packages/backend
        shell: bash
        env:
          npm_config_script_shell: bash
        run: ./build.sh

      - name: Install apps/desktop npm deps
        working-directory: apps/desktop
        run: npm install --no-audit --no-fund

      - name: Generate icons (if missing)
        working-directory: apps/desktop
        shell: bash
        run: |
          if [ ! -f src-tauri/icons/icon.ico ]; then
            uv --project ../../packages/backend run --with Pillow \
              python src-tauri/icons/make_icons.py
          fi

      - name: Build PyInstaller sidecar
        working-directory: apps/desktop
        run: node python-sidecar/build.cjs

      - name: Build Tauri app (unsigned)
        working-directory: apps/desktop
        shell: bash
        env:
          # v0.0.1 ships unsigned. Empty APPLE_CERTIFICATE would otherwise
          # trigger Tauri's signing path and fail with "security import".
          # When you enable signing, wire the APPLE_* + WINDOWS_* secrets
          # back into this env block.
          CARGO_INCREMENTAL: "0"
        run: |
          case "${{ matrix.os }}" in
            macos)   bundles="app,dmg" ;;
            # Skip AppImage for v0.0.1 — linuxdeploy has runtime issues
            # on the ubuntu-22.04 runner (requires libfuse2 + DISPLAY).
            # Users on Linux get .deb and .rpm.
            linux)   bundles="deb,rpm" ;;
            windows) bundles="msi,nsis" ;;
          esac
          npx tauri build --target ${{ matrix.target }} --bundles "$bundles"

      # Rename each bundle to a simple, space-free filename so the release
      # page is cleaner AND so upload-artifact's glob doesn't trip on
      # spaces (known v4 quirk where "dist-artifacts/**" silently
      # matched zero files when the dir contained a file with spaces).
      - name: Collect artifacts (rename to space-free names)
        working-directory: apps/desktop
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist-artifacts"
          DST="$GITHUB_WORKSPACE/dist-artifacts"
          BASE="geospatial-atlas-${{ matrix.os }}-${{ matrix.arch }}"
          TGT=src-tauri/target/${{ matrix.target }}/release/bundle
          case "${{ matrix.os }}" in
            macos)
              f=$(ls "$TGT"/dmg/*.dmg 2>/dev/null | head -1) && cp "$f" "$DST/$BASE.dmg"
              ;;
            linux)
              f=$(ls "$TGT"/deb/*.deb 2>/dev/null | head -1) && cp "$f" "$DST/$BASE.deb"
              f=$(ls "$TGT"/rpm/*.rpm 2>/dev/null | head -1) && cp "$f" "$DST/$BASE.rpm"
              ;;
            windows)
              f=$(ls "$TGT"/msi/*.msi 2>/dev/null | head -1) && cp "$f" "$DST/$BASE.msi"
              f=$(ls "$TGT"/nsis/*.exe 2>/dev/null | head -1) && cp "$f" "$DST/$BASE-setup.exe"
              ;;
          esac
          ls -la "$DST/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geospatial-atlas-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ github.workspace }}/dist-artifacts/*
          if-no-files-found: error

  release:
    name: draft release
    needs: build
    if: startsWith(github.ref, 'refs/tags/app-v') || github.event.inputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: geospatial-atlas-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist

      - name: Attach artifacts to draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.deb
            dist/*.rpm
            dist/*.msi
            dist/*.exe
          fail_on_unmatched_files: false
