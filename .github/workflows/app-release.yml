name: app release (desktop)

# Builds the desktop app (Electron shell + PyInstaller sidecar) for
# macOS (arm64 only — see below), Linux (x86_64 .deb + .rpm), and
# Windows (x86_64 .msi + .exe NSIS installer).
#
# macOS x86_64 was dropped starting with v0.0.2: macos-13 runners
# routinely sit in the queue for >10 h before picking up a job, which
# stalls every release. Intel-Mac users should fall back to the
# ``uv run geospatial-atlas`` CLI path.
#
# Trigger manually via the Actions tab or by pushing a tag shaped like
# `v0.0.7`. On tag push, the built artifacts are attached to a draft
# GitHub Release. (Desktop releases up to app-v0.0.6 used the `app-v*`
# prefix; the scheme switched to bare `v*` so Zenodo's auto-DOI
# integration picks up clean version strings.)
#
# Note: the Rust toolchain + wasm-bindgen are still installed because
# the viewer static bundle (packages/viewer + packages/component) pulls
# in density-clustering and umap WASM crates. They are NOT used for the
# shell itself — that is now Electron/Node, no Rust required.

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Attach built artifacts to a draft release"
        required: false
        default: "false"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            arch: arm64
            runner: macos-14
            electron_flag: --mac
          - os: linux
            arch: x64
            runner: ubuntu-22.04
            electron_flag: --linux
          - os: windows
            arch: x64
            runner: windows-latest
            electron_flag: --win

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Rust toolchain (wasm32 for density-clustering / umap)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        uses: baptiste0928/cargo-install@v3
        with:
          crate: wasm-bindgen-cli
          version: "0.2.114"

      - name: Cache Cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/density-clustering -> target
          shared-key: ${{ matrix.os }}-${{ matrix.arch }}

      # Linux: only rpmbuild is needed for electron-builder's .rpm target.
      # WebKitGTK + libappindicator are NOT required — Electron ships
      # Chromium; only GTK runtime libs are needed at the target's runtime
      # (those become the .deb's Depends, not build-time packages).
      - name: Install Linux system deps
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install npm workspaces (root → component, viewer, backend, …)
        run: npm install --no-audit --no-fund

      # Workaround for https://github.com/npm/cli/issues/4828: npm's
      # workspace install doesn't reliably install platform-specific
      # optional deps (rolldown/lightningcss native bindings).
      - name: Install platform-specific native bindings
        shell: bash
        run: |
          case "${{ matrix.os }}-${{ matrix.arch }}" in
            macos-arm64)
              PKGS="@rolldown/binding-darwin-arm64 lightningcss-darwin-arm64" ;;
            linux-x64)
              PKGS="@rolldown/binding-linux-x64-gnu lightningcss-linux-x64-gnu" ;;
            windows-x64)
              PKGS="@rolldown/binding-win32-x64-msvc lightningcss-win32-x64-msvc" ;;
          esac
          if [ -n "$PKGS" ]; then
            npm install --no-save --no-audit --no-fund $PKGS
          fi

      - name: Sync backend Python env
        working-directory: packages/backend
        run: uv sync --frozen

      # Build viewer + backend static bundle — feeds into the PyInstaller
      # sidecar binary (it serves this HTML/JS/WASM to the loopback origin).
      - name: Build viewer + backend static bundle
        working-directory: packages/backend
        shell: bash
        env:
          npm_config_script_shell: bash
        run: ./build.sh

      - name: Install apps/desktop npm deps
        working-directory: apps/desktop
        run: npm install --no-audit --no-fund

      - name: Generate icons (if missing)
        working-directory: apps/desktop
        shell: bash
        run: |
          if [ ! -f icons/icon.ico ]; then
            uv --project ../../packages/backend run --with Pillow \
              python icons/make_icons.py
          fi

      - name: Build PyInstaller sidecar
        working-directory: apps/desktop
        run: node python-sidecar/build.cjs

      - name: Build Electron app (unsigned)
        working-directory: apps/desktop
        shell: bash
        env:
          # Ad-hoc codesigning only — no APPLE_* secrets wired up yet.
          # electron-builder reads CSC_IDENTITY_AUTO_DISCOVERY=false to
          # skip looking for Developer ID in the keychain.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # Skip electron-builder's auto-update provider config.
          USE_HARD_LINKS: "false"
        run: |
          npm run build
          npx electron-builder ${{ matrix.electron_flag }} \
            --config electron-builder.yml \
            --publish never

      # Rename each bundle to a simple, space-free filename so the release
      # page is cleaner.
      - name: Collect artifacts (rename to space-free names)
        working-directory: apps/desktop
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist-artifacts"
          DST="$GITHUB_WORKSPACE/dist-artifacts"
          BASE="geospatial-atlas-${{ matrix.os }}-${{ matrix.arch }}"
          SRC="release"
          case "${{ matrix.os }}" in
            macos)
              f=$(ls "$SRC"/*.dmg 2>/dev/null | head -1) && cp "$f" "$DST/$BASE.dmg"
              ;;
            linux)
              f=$(ls "$SRC"/*.deb 2>/dev/null | head -1) && cp "$f" "$DST/$BASE.deb"
              f=$(ls "$SRC"/*.rpm 2>/dev/null | head -1) && cp "$f" "$DST/$BASE.rpm"
              ;;
            windows)
              f=$(ls "$SRC"/*.msi 2>/dev/null | head -1) && cp "$f" "$DST/$BASE.msi"
              f=$(ls "$SRC"/*setup*.exe 2>/dev/null | head -1) && cp "$f" "$DST/$BASE-setup.exe"
              ;;
          esac
          ls -la "$DST/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geospatial-atlas-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ github.workspace }}/dist-artifacts/*
          if-no-files-found: error

  release:
    name: draft release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: geospatial-atlas-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist

      - name: Attach artifacts to draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.deb
            dist/*.rpm
            dist/*.msi
            dist/*.exe
          fail_on_unmatched_files: false
